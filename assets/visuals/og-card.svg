<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#080c14"/>

  <!-- Subtle grid texture -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.2" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Gold accent bar left -->
  <rect x="80" y="80" width="4" height="470" fill="#f59e0b" opacity="0.9" rx="2"/>

  <!-- Name -->
  <text x="120" y="220" font-family="Georgia, 'Times New Roman', serif" font-size="80" font-weight="700" fill="#f1f5f9" letter-spacing="-2">Pallavi Sharma</text>

  <!-- Title -->
  <text x="122" y="290" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-weight="400" fill="#f59e0b" letter-spacing="1">AI Product Leader</text>

  <!-- Divider -->
  <line x1="122" y1="330" x2="680" y2="330" stroke="#ffffff" stroke-width="1" opacity="0.12"/>

  <!-- Tagline -->
  <text x="122" y="390" font-family="Georgia, 'Times New Roman', serif" font-size="30" fill="#94a3b8" letter-spacing="0.5">Silicon</text>
  <text x="258" y="390" font-family="Georgia, 'Times New Roman', serif" font-size="30" fill="#f59e0b">→</text>
  <text x="298" y="390" font-family="Georgia, 'Times New Roman', serif" font-size="30" fill="#94a3b8" letter-spacing="0.5">Cloud</text>
  <text x="416" y="390" font-family="Georgia, 'Times New Roman', serif" font-size="30" fill="#f59e0b">→</text>
  <text x="456" y="390" font-family="Georgia, 'Times New Roman', serif" font-size="30" fill="#94a3b8" letter-spacing="0.5">AI</text>

  <!-- Bio line -->
  <text x="122" y="450" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#64748b">Designed chips at Intel · Built cloud infrastructure at AWS · Ships agentic AI at Amazon</text>

  <!-- URL -->
  <text x="122" y="530" font-family="'Courier New', Courier, monospace" font-size="18" fill="#f59e0b" opacity="0.7" letter-spacing="1">pallavi-ai-labs.github.io</text>

  <!-- Right side decorative arc -->
  <circle cx="960" cy="315" r="180" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.08"/>
  <circle cx="960" cy="315" r="130" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.06"/>
  <circle cx="960" cy="315" r="80" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.1"/>

  <!-- Orbit nodes -->
  <circle cx="960" cy="135" r="8" fill="#f59e0b" opacity="0.6"/>
  <text x="975" y="140" font-family="'Courier New', Courier, monospace" font-size="14" fill="#f59e0b" opacity="0.5">Silicon</text>

  <circle cx="1100" cy="360" r="8" fill="#60a5fa" opacity="0.6"/>
  <text x="1115" y="365" font-family="'Courier New', Courier, monospace" font-size="14" fill="#60a5fa" opacity="0.5">Cloud</text>

  <circle cx="840" cy="430" r="8" fill="#f59e0b" opacity="0.6"/>
  <text x="855" y="435" font-family="'Courier New', Courier, monospace" font-size="14" fill="#f59e0b" opacity="0.5">AI</text>
</svg>
